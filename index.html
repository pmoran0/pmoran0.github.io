<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c0a0a" id="meta-theme-color">
    <title>Archivos de Ravenloft</title>
    <style>
        /* =========================================================
           Variables de Tema (Ravenloft Gothic vs Old Parchment)
           ========================================================= */
        :root {
            /* Tema Oscuro (Gótico) */
            --bg-body: #0c0a0a;
            --bg-panel: #1a1515;
            --bg-input: #0c0a0a;
            --text-main: #d8cbb8;
            --text-muted: #a89f91;
            --accent-main: #8b0000;
            --accent-hover: #5a1111;
            --border-color: #3a1c1c;
            
            --table-th: #2b0c0c;
            --table-tr: #141010;
            --table-tr-hover: #2a1111;
            --table-desc: #080606;
            --shadow-color: rgba(0, 0, 0, 0.7);
        }

        [data-theme="light"] {
            /* Tema Claro (Pergamino Antiguo) */
            --bg-body: #f4ebd8;
            --bg-panel: #e8dac3;
            --bg-input: #fdf6ec;
            --text-main: #2b1c15;
            --text-muted: #5c4335;
            --accent-main: #9e1b1b;
            --accent-hover: #7a1515;
            --border-color: #c4ab8f;
            
            --table-th: #d1b99e;
            --table-tr: #f9f2e8;
            --table-tr-hover: #ebdcc5;
            --table-desc: #efe4d3;
            --shadow-color: rgba(60, 40, 20, 0.15);
        }

        /* =========================================================
           Estilos Base e Interfaz
           ========================================================= */
        body {
            background-color: var(--bg-body);
            color: var(--text-main); 
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            margin: 0;
            padding: 15px;
            transition: background-color 0.4s, color 0.4s;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        /* =========================================================
           Pantalla de Inicio (Landing Page)
           ========================================================= */
        #landing-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .landing-title {
            font-size: 2.8em;
            color: var(--accent-main);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px var(--shadow-color);
            border-bottom: none;
            letter-spacing: 3px;
        }

        .landing-subtitle {
            font-size: 1.2em;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-style: italic;
        }

        .landing-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 850px;
        }

        .btn-large {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 2px solid var(--accent-main);
            padding: 18px 30px;
            font-size: 1.2em;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px var(--shadow-color);
            flex: 1;
            min-width: 250px;
        }

        .btn-large:hover:not(.disabled) {
            background-color: var(--accent-hover);
            color: #e6d8c3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--shadow-color);
        }

        /* Contenedores de las Secciones (Ocultos por defecto) */
        #nwp-app, #skills-app, #am-app {
            display: none;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* =========================================================
           Secciones de Tablas y Paneles de Control
           ========================================================= */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-hover);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-main); 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.4em;
            text-shadow: 1px 1px 2px var(--shadow-color);
        }

        .btn-theme {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--accent-main);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 4px var(--shadow-color);
        }
        
        .btn-theme:hover {
            background-color: var(--accent-hover);
            color: #e6d8c3;
        }

        .controls-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background-color 0.4s, border-color 0.4s;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--accent-main);
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
            transition: background-color 0.4s, color 0.4s;
        }

        .search-bar:focus { outline: none; border-color: var(--text-main); }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group { display: flex; flex-direction: column; }

        .filter-group label.group-title {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkbox-group-container {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-height: 120px;
            overflow-y: auto;
            padding: 8px;
            transition: border-color 0.3s;
        }

        .checkbox-group-container:focus-within { border-color: var(--accent-main); }

        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--text-main);
            cursor: pointer;
            margin-bottom: 6px;
            user-select: none;
        }

        .checkbox-option:last-child { margin-bottom: 0; }
        .checkbox-option input { cursor: pointer; accent-color: var(--accent-main); margin: 0; }

        /* Estilo Scroll */
        .checkbox-group-container::-webkit-scrollbar { width: 6px; }
        .checkbox-group-container::-webkit-scrollbar-track { background: var(--bg-body); }
        .checkbox-group-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        .checkbox-group-container::-webkit-scrollbar-thumb:hover { background: var(--accent-main); }

        .btn-reset {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px dashed var(--accent-main);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            margin-top: 5px;
            font-size: 0.95em;
        }

        .btn-reset:hover {
            background-color: var(--accent-hover);
            color: #e6d8c3;
            border-style: solid;
        }

        /* =========================================================
           Tablas y Estructura Adaptable
           ========================================================= */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--table-tr);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background-color 0.4s;
        }

        th {
            background-color: var(--table-th);
            color: var(--text-main);
            padding: 14px;
            border: 1px solid var(--border-color);
            text-align: center;
            font-weight: bold;
        }

        td {
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-main);
        }

        tr.main-row { transition: background-color 0.2s; cursor: pointer; }
        tr.main-row:hover { background-color: var(--table-tr-hover); }

        /* Acordeón de Descripciones Optimizado */
        .desc-row td { padding: 0 !important; border: none !important; }

        .desc-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s ease-out;
            background-color: var(--table-desc);
            color: var(--text-main);
            text-align: left;
            font-size: 1.08em; 
        }

        .desc-row.show .desc-content {
            max-height: 2000px; /* Incrementado para dar cabida a listas largas de maniobras */
            padding: 20px 40px; 
            border-bottom: 1px solid var(--border-color);
            border-top: 1px dashed var(--accent-main);
        }

        .desc-content p { margin: 0; text-indent: 10px; }

        /* =========================================================
           Responsividad Estilo Cartas Móviles
           ========================================================= */
        @media screen and (max-width: 768px) {
            .landing-title { font-size: 2em; }
            .header-container { flex-direction: column; gap: 12px; text-align: center; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            table { background-color: transparent; box-shadow: none; }

            tr.main-row {
                margin-bottom: 12px;
                border: 1px solid var(--border-color);
                border-radius: 6px;
                background-color: var(--bg-panel);
                box-shadow: 0 2px 5px var(--shadow-color);
            }

            td {
                border: none;
                border-bottom: 1px solid var(--border-color);
                position: relative;
                padding-left: 45%;
                text-align: left;
                min-height: 30px;
                display: flex;
                align-items: center;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 12px;
                width: 40%;
                white-space: nowrap;
                font-weight: bold;
                color: var(--accent-main);
                text-align: left;
            }

            td:last-child { border-bottom: 0; }
            .desc-row td::before { content: none; }
            .desc-row td { padding-left: 0; border-bottom: none; display: block; }
            
            .desc-row.show .desc-content {
                border-bottom-left-radius: 6px;
                border-bottom-right-radius: 6px;
                margin-bottom: 12px;
                border: 1px solid var(--border-color);
                padding: 18px 25px; 
            }
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <h1 class="landing-title">Archivos de Ravenloft</h1>
        <p class="landing-subtitle">Elige el conocimiento que deseas develar...</p>
        
        <div class="landing-buttons">
            <button class="btn-large" onclick="openApp('nwp')">Pericias en No Armas</button>
            <button class="btn-large" onclick="openApp('skills')">Skills</button>
            <button class="btn-large" onclick="openApp('am')">Estilos de Artes Marciales</button>
        </div>
    </div>

    <div id="nwp-app">
        <div class="header-container">
            <h1>Pericias en No Armas</h1>
            <div>
                <button class="btn-theme" onclick="closeApp('nwp')" style="margin-right: 10px;">Volver</button>
                <button class="btn-theme" onclick="toggleTheme()">Invocar Luz</button>
            </div>
        </div>

        <div class="controls-panel">
            <input type="text" id="nwp-global-search" class="search-bar" placeholder="Investigar pericias (Nombre, descripciones...)" oninput="applyNwpFilters()">
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="group-title">Nombre</label>
                    <input type="text" id="nwp-filter-name" placeholder="Ej. Spellmaking" style="background-color: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; font-family: inherit;" oninput="applyNwpFilters()">
                </div>
                <div class="filter-group">
                    <label class="group-title">Slots</label>
                    <div id="nwp-filter-slots" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Habilidad</label>
                    <div id="nwp-filter-ability" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Clase</label>
                    <div id="nwp-filter-class" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Raza</label>
                    <div id="nwp-filter-race" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Source</label>
                    <div id="nwp-filter-source" class="checkbox-group-container"></div>
                </div>
            </div>

            <button class="btn-reset" onclick="resetNwpFilters()">Purificar Filtros</button>
        </div>

        <table id="nwp-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Slots</th>
                    <th>Habilidad</th>
                    <th>Mod</th>
                    <th>Clase</th>
                    <th>Raza</th>
                    <th>Source</th>
                </tr>
            </thead>
            <tbody id="nwp-table-body"></tbody>
        </table>
    </div>

    <div id="skills-app">
        <div class="header-container">
            <h1>Skills Especiales</h1>
            <div>
                <button class="btn-theme" onclick="closeApp('skills')" style="margin-right: 10px;">Volver</button>
                <button class="btn-theme" onclick="toggleTheme()">Invocar Luz</button>
            </div>
        </div>

        <div class="controls-panel">
            <input type="text" id="sk-global-search" class="search-bar" placeholder="Investigar skills (Nombre, descripciones...)" oninput="applySkFilters()">
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="group-title">Nombre</label>
                    <input type="text" id="sk-filter-name" placeholder="Ej. Dureza" style="background-color: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; font-family: inherit;" oninput="applySkFilters()">
                </div>
                <div class="filter-group">
                    <label class="group-title">Nivel / Rango</label>
                    <div id="sk-filter-level" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Clase Vínculo</label>
                    <div id="sk-filter-class" class="checkbox-group-container"></div>
                </div>
            </div>

            <button class="btn-reset" onclick="resetSkFilters()">Purificar Filtros</button>
        </div>

        <table id="sk-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Nivel / Rango</th>
                    <th>Clase Vínculo</th>
                </tr>
            </thead>
            <tbody id="sk-table-body"></tbody>
        </table>
    </div>

    <div id="am-app">
        <div class="header-container">
            <h1>Estilos de Artes Marciales</h1>
            <div>
                <button class="btn-theme" onclick="closeApp('am')" style="margin-right: 10px;">Volver</button>
                <button class="btn-theme" onclick="toggleTheme()">Invocar Luz</button>
            </div>
        </div>

        <div class="controls-panel">
            <input type="text" id="am-global-search" class="search-bar" placeholder="Investigar estilos (Nombre, armas, maniobras...)" oninput="applyAmFilters()">
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="group-title">Nombre Estilo</label>
                    <input type="text" id="am-filter-name" placeholder="Ej. Karate" style="background-color: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; font-family: inherit;" oninput="applyAmFilters()">
                </div>
                <div class="filter-group">
                    <label class="group-title">Ataque Principal</label>
                    <div id="am-filter-attack" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Nº Ataques</label>
                    <div id="am-filter-num" class="checkbox-group-container"></div>
                </div>
                <div class="filter-group">
                    <label class="group-title">Categorías Libres</label>
                    <div id="am-filter-cats" class="checkbox-group-container"></div>
                </div>
            </div>

            <button class="btn-reset" onclick="resetAmFilters()">Purificar Filtros</button>
        </div>

        <table id="am-table">
            <thead>
                <tr>
                    <th>Estilo</th>
                    <th>Nº Ataques</th>
                    <th>Daño Base</th>
                    <th>Mod. AC</th>
                    <th>Ataque Principal</th>
                    <th>Armas Disponibles</th>
                </tr>
            </thead>
            <tbody id="am-table-body"></tbody>
        </table>
    </div>

    <script src="non-weapon-proficiencies.js"></script>
    <script src="skills.js"></script>
    <script src="artemarcialismos-lista.js"></script>
    <script src="artemarcialismos-maniobras.js"></script>

    <script>
        // ==========================================
        // Enrutador y Conmutador de Pantallas
        // ==========================================
        function openApp(mode) {
            document.getElementById('landing-screen').style.display = 'none';
            if (mode === 'nwp') {
                document.getElementById('nwp-app').style.display = 'block';
                renderNwpTable();
            } else if (mode === 'skills') {
                document.getElementById('skills-app').style.display = 'block';
                renderSkTable();
            } else if (mode === 'am') {
                document.getElementById('am-app').style.display = 'block';
                renderAmTable();
            }
        }

        function closeApp(mode) {
            if (mode === 'nwp') document.getElementById('nwp-app').style.display = 'none';
            if (mode === 'skills') document.getElementById('skills-app').style.display = 'none';
            if (mode === 'am') document.getElementById('am-app').style.display = 'none';
            document.getElementById('landing-screen').style.display = 'flex';
        }

        // ==========================================
        // Control Cromático de Iluminación
        // ==========================================
        const metaThemeColor = document.getElementById('meta-theme-color');

        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('ravenloftTheme', themeName);
            
            const buttons = document.querySelectorAll('.btn-theme');
            buttons.forEach(btn => {
                if (btn.textContent.includes('Luz') || btn.textContent.includes('Penumbra')) {
                    btn.textContent = (themeName === 'light') ? 'Invocar Penumbra' : 'Invocar Luz';
                }
            });
            metaThemeColor.setAttribute('content', (themeName === 'light') ? '#f4ebd8' : '#0c0a0a');
        }

        function toggleTheme() {
            const current = localStorage.getItem('ravenloftTheme') === 'light' ? 'dark' : 'light';
            setTheme(current);
        }

        (function() {
            setTheme(localStorage.getItem('ravenloftTheme') === 'light' ? 'light' : 'dark');
        })();

        // ==========================================
        // Registro y Motores de Datos
        // ==========================================
        let nwpData = [], nwpFiltered = [], nwpExpandedId = null;
        let skData = [], skFiltered = [], skExpandedId = null;
        let amData = {}, amFilteredKeys = [], amExpandedKey = null;

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof periciasData !== 'undefined') {
                nwpData = periciasData;
                nwpFiltered = periciasData;
                populateNwpCheckboxes();
            }
            if (typeof skillsData !== 'undefined') {
                skData = skillsData;
                skFiltered = skillsData;
                populateSkCheckboxes();
            }
            if (typeof artemarcialismosData !== 'undefined') {
                amData = artemarcialismosData;
                amFilteredKeys = Object.keys(artemarcialismosData);
                populateAmCheckboxes();
            }
        });

        // Inyección Generalizada de Cajas Checkbox
        function fillCheckboxGroup(containerId, values, onChangeFunc) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            values.forEach(v => {
                const label = document.createElement('label');
                label.className = 'checkbox-option';
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = v;
                cb.onchange = onChangeFunc;
                
                const span = document.createElement('span');
                span.textContent = v;
                
                label.appendChild(cb);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        function getSelectedValues(containerId) {
            const checkboxes = document.querySelectorAll(`#${containerId} input:checked`);
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // ==========================================
        // PROCEDIMIENTOS MÓDULO: NO ARMAS (NWP)
        // ==========================================
        function populateNwpCheckboxes() {
            const slots = new Set(), abilities = new Set(), classes = new Set(), races = new Set(), sources = new Set();
            nwpData.forEach(p => {
                if (p.slots !== undefined) slots.add(p.slots);
                if (p.ability) abilities.add(p.ability);
                if (p.class) p.class.split(',').forEach(c => classes.add(c.trim()));
                if (p.race) p.race.split(',').forEach(r => races.add(r.trim()));
                if (p.source) sources.add(p.source);
            });
            fillCheckboxGroup('nwp-filter-slots', Array.from(slots).sort((a,b)=>a-b), applyNwpFilters);
            fillCheckboxGroup('nwp-filter-ability', Array.from(abilities).sort(), applyNwpFilters);
            fillCheckboxGroup('nwp-filter-class', Array.from(classes).sort(), applyNwpFilters);
            fillCheckboxGroup('nwp-filter-race', Array.from(races).sort(), applyNwpFilters);
            fillCheckboxGroup('nwp-filter-source', Array.from(sources).sort(), applyNwpFilters);
        }

        function applyNwpFilters() {
            const gSearch = document.getElementById('nwp-global-search').value.toLowerCase();
            const fName = document.getElementById('nwp-filter-name').value.toLowerCase();
            
            const selSlots = getSelectedValues('nwp-filter-slots');
            const selAbilities = getSelectedValues('nwp-filter-ability');
            const selClasses = getSelectedValues('nwp-filter-class');
            const selRaces = getSelectedValues('nwp-filter-race');
            const selSources = getSelectedValues('nwp-filter-source');
            
            nwpFiltered = nwpData.filter(p => {
                const matchesGlobal = Object.values(p).join(' ').toLowerCase().includes(gSearch);
                const matchesName = p.name.toLowerCase().includes(fName);
                const matchesSlots = selSlots.length === 0 || selSlots.includes(p.slots.toString());
                const matchesAbility = selAbilities.length === 0 || (p.ability && selAbilities.includes(p.ability));
                const matchesClass = selClasses.length === 0 || (p.class && selClasses.some(c => p.class.includes(c)));
                const matchesRace = selRaces.length === 0 || (p.race && selRaces.some(r => p.race.includes(r)));
                const matchesSource = selSources.length === 0 || (p.source && selSources.includes(p.source));
                
                return matchesGlobal && matchesName && matchesSlots && matchesAbility && matchesClass && matchesRace && matchesSource;
            });
            nwpExpandedId = null;
            renderNwpTable();
        }

        function resetNwpFilters() {
            document.getElementById('nwp-global-search').value = '';
            document.getElementById('nwp-filter-name').value = '';
            document.querySelectorAll('#nwp-app .checkbox-group-container input').forEach(cb => cb.checked = false);
            applyNwpFilters();
        }

        function renderNwpTable() {
            const tbody = document.getElementById('nwp-table-body');
            let html = '';
            nwpFiltered.forEach(item => {
                const itemId = item.id || Math.floor(Math.random() * 100000);
                html += `<tr class="main-row" onclick="toggleRow('nwp', ${itemId})">`;
                html += `<td data-label="Nombre"><strong>${item.name}</strong></td>`;
                html += `<td data-label="Slots">${item.slots}</td>`;
                html += `<td data-label="Habilidad">${item.ability || '-'}</td>`;
                html += `<td data-label="Mod">${item.modifier !== undefined ? item.modifier : '-'}</td>`;
                html += `<td data-label="Clase">${item.class || '-'}</td>`;
                html += `<td data-label="Raza">${item.race || '-'}</td>`;
                html += `<td data-label="Source">${item.source || '-'}</td>`;
                html += `</tr>`;
                html += `<tr class="desc-row" id="nwp-desc-${itemId}">
                    <td colspan="7">
                        <div class="desc-content"><p><em>${item.description || 'Sin descripción.'}</em></p></div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            if (nwpExpandedId !== null) {
                const el = document.getElementById(`nwp-desc-${nwpExpandedId}`);
                if (el) el.classList.add('show');
            }
        }

        // ==========================================
        // PROCEDIMIENTOS MÓDULO: SKILLS ESPECIALES
        // ==========================================
        function populateSkCheckboxes() {
            const levels = new Set(), classes = new Set();
            skData.forEach(s => {
                if (s.level !== undefined) levels.add(s.level);
                if (s.class) s.class.split(',').forEach(c => classes.add(c.trim()));
            });
            const sortedLevels = Array.from(levels).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
            fillCheckboxGroup('sk-filter-level', sortedLevels, applySkFilters);
            fillCheckboxGroup('sk-filter-class', Array.from(classes).sort(), applySkFilters);
        }

        function applySkFilters() {
            const gSearch = document.getElementById('sk-global-search').value.toLowerCase();
            const fName = document.getElementById('sk-filter-name').value.toLowerCase();
            
            const selLevels = getSelectedValues('sk-filter-level');
            const selClasses = getSelectedValues('sk-filter-class');
            
            skFiltered = skData.filter(s => {
                const matchesGlobal = Object.values(s).join(' ').toLowerCase().includes(gSearch);
                const matchesName = s.name.toLowerCase().includes(fName);
                const matchesLevel = selLevels.length === 0 || selLevels.includes(s.level.toString());
                const matchesClass = selClasses.length === 0 || (s.class && selClasses.some(c => s.class.includes(c)));
                
                return matchesGlobal && matchesName && matchesLevel && matchesClass;
            });
            skExpandedId = null;
            renderSkTable();
        }

        function resetSkFilters() {
            document.getElementById('sk-global-search').value = '';
            document.getElementById('sk-filter-name').value = '';
            document.querySelectorAll('#skills-app .checkbox-group-container input').forEach(cb => cb.checked = false);
            applySkFilters();
        }

        function renderSkTable() {
            const tbody = document.getElementById('sk-table-body');
            let html = '';
            skFiltered.forEach((item, index) => {
                html += `<tr class="main-row" onclick="toggleRow('sk', ${index})">`;
                html += `<td data-label="Nombre"><strong>${item.name}</strong></td>`;
                html += `<td data-label="Nivel / Rango">${item.level}</td>`;
                html += `<td data-label="Clase Vínculo">${item.class || '-'}</td>`;
                html += `</tr>`;
                html += `<tr class="desc-row" id="sk-desc-${index}">
                    <td colspan="3">
                        <div class="desc-content"><p><em>${item.description || 'Sin descripción.'}</em></p></div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            if (skExpandedId !== null) {
                const el = document.getElementById(`sk-desc-${skExpandedId}`);
                if (el) el.classList.add('show');
            }
        }

        // ==========================================
        // PROCEDIMIENTOS MÓDULO: ARTEMARCIALISMOS (AM)
        // ==========================================
        function populateAmCheckboxes() {
            const attacks = new Set(), numbers = new Set(), categories = new Set();
            Object.keys(amData).forEach(key => {
                const style = amData[key];
                if (style.ataquePrincipal) attacks.add(style.ataquePrincipal);
                if (style.numeroAtaques) numbers.add(style.numeroAtaques);
                if (style.maniobras) {
                    Object.keys(style.maniobras).forEach(cat => categories.add(cat));
                }
            });
            fillCheckboxGroup('am-filter-attack', Array.from(attacks).sort(), applyAmFilters);
            fillCheckboxGroup('am-filter-num', Array.from(numbers).sort(), applyAmFilters);
            fillCheckboxGroup('am-filter-cats', Array.from(categories).sort(), applyAmFilters);
        }

        function applyAmFilters() {
            const gSearch = document.getElementById('am-global-search').value.toLowerCase();
            const fName = document.getElementById('am-filter-name').value.toLowerCase();
            
            const selAttacks = getSelectedValues('am-filter-attack');
            const selNumbers = getSelectedValues('am-filter-num');
            const selCats = getSelectedValues('am-filter-cats');
            
            amFilteredKeys = Object.keys(amData).filter(key => {
                const style = amData[key];
                
                // Bloque textual unificado para búsqueda global
                let searchableStr = key + " " + (style.ataquePrincipal || "") + " " + (style.numeroAtaques || "") + " " + (style.daño || "") + " " + (style.armasDisponibles || "");
                if (style.maniobras) searchableStr += " " + Object.keys(style.maniobras).join(" ");
                
                const matchesGlobal = searchableStr.toLowerCase().includes(gSearch);
                const matchesName = key.toLowerCase().includes(fName);
                const matchesAttack = selAttacks.length === 0 || selAttacks.includes(style.ataquePrincipal);
                const matchesNum = selNumbers.length === 0 || selNumbers.includes(style.numeroAtaques);
                
                const styleCats = style.maniobras ? Object.keys(style.maniobras) : [];
                const matchesCats = selCats.length === 0 || selCats.some(c => styleCats.includes(c));
                
                return matchesGlobal && matchesName && matchesAttack && matchesNum && matchesCats;
            });
            
            amExpandedKey = null;
            renderAmTable();
        }

        function resetAmFilters() {
            document.getElementById('am-global-search').value = '';
            document.getElementById('am-filter-name').value = '';
            document.querySelectorAll('#am-app .checkbox-group-container input').forEach(cb => cb.checked = false);
            applyAmFilters();
        }

        function renderAmTable() {
            const tbody = document.getElementById('am-table-body');
            let html = '';
            
            amFilteredKeys.forEach(key => {
                const style = amData[key];
                const safeId = key.replace(/[^a-zA-Z0-9]/g, '_');
                
                html += `<tr class="main-row" onclick="toggleRow('am', '${safeId}')">`;
                html += `<td data-label="Estilo"><strong>${key}</strong></td>`;
                html += `<td data-label="Nº Ataques">${style.numeroAtaques || '-'}</td>`;
                html += `<td data-label="Daño Base">${style.daño || '-'}</td>`;
                html += `<td data-label="Mod. AC">${style.armorClassMod || '-'}</td>`;
                html += `<td data-label="Ataque Principal">${style.ataquePrincipal || '-'}</td>`;
                html += `<td data-label="Armas Disponibles">${style.armasDisponibles || '-'}</td>`;
                html += `</tr>`;
                
                // Construcción relacional de los movimientos usando maniobrasData
                let contentHtml = '';
                if (style.maniobras && typeof maniobrasData !== 'undefined') {
                    Object.keys(style.maniobras).forEach(catName => {
                        contentHtml += `<div style="margin-bottom: 15px;">`;
                        contentHtml += `<h4 style="color: var(--accent-main); margin: 0 0 8px 0; text-transform: uppercase; border-bottom: 1px dashed var(--border-color); padding-bottom: 2px; font-size: 1.1em; letter-spacing: 0.5px;">${catName}s</h4>`;
                        contentHtml += `<ul style="margin: 0; padding-left: 20px; list-style-type: square;">`;
                        
                        style.maniobras[catName].forEach(num => {
                            const details = (maniobrasData[catName] && maniobrasData[catName][num]) ? maniobrasData[catName][num] : null;
                            if (details) {
                                contentHtml += `<li style="margin-bottom: 10px;">`;
                                contentHtml += `<strong style="font-size: 1.05em;">[${num}] ${details.nombre}</strong>`;
                                if (details.descripcionCorta) {
                                    contentHtml += ` — <span style="color: var(--text-muted); font-style: italic; font-size: 0.95em;">${details.descripcionCorta}</span>`;
                                }
                                if (details.descripcionLarga) {
                                    contentHtml += `<p style="margin: 4px 0 0 0; text-indent: 0; font-size: 0.95em; text-align: justify; color: var(--text-main);">${details.descripcionLarga}</p>`;
                                }
                                contentHtml += `</li>`;
                            } else {
                                contentHtml += `<li style="margin-bottom: 6px;"><strong>[${num}]</strong> Maniobra no identificada en el grimorio base.</li>`;
                            }
                        });
                        
                        contentHtml += `</ul>`;
                        contentHtml += `</div>`;
                    });
                } else {
                    contentHtml = `<p style="color: var(--text-muted); font-style: italic;">No se encontraron descriptores de maniobras cargados.</p>`;
                }
                
                html += `<tr class="desc-row" id="am-desc-${safeId}">
                    <td colspan="6">
                        <div class="desc-content">
                            ${contentHtml}
                        </div>
                    </td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            if (amExpandedKey !== null) {
                const el = document.getElementById(`am-desc-${amExpandedKey}`);
                if (el) el.classList.add('show');
            }
        }

        // ==========================================
        // Controlador Único de Acordeones
        // ==========================================
        function toggleRow(prefix, id) {
            let currentExpanded = (prefix === 'nwp') ? nwpExpandedId : ((prefix === 'sk') ? skExpandedId : amExpandedKey);
            
            if (currentExpanded === id) {
                const el = document.getElementById(`${prefix}-desc-${id}`);
                if (el) el.classList.remove('show');
                if (prefix === 'nwp') nwpExpandedId = null;
                else if (prefix === 'sk') skExpandedId = null;
                else amExpandedKey = null;
            } else {
                if (currentExpanded !== null) {
                    const oldEl = document.getElementById(`${prefix}-desc-${currentExpanded}`);
                    if (oldEl) oldEl.classList.remove('show');
                }
                const targetEl = document.getElementById(`${prefix}-desc-${id}`);
                if (targetEl) {
                    targetEl.classList.add('show');
                    if (prefix === 'nwp') nwpExpandedId = id;
                    else if (prefix === 'sk') skExpandedId = id;
                    else amExpandedKey = id;
                }
            }
        }
    </script>
</body>
</html>
